<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LISTeditor</title>
  <style id="col-hide-styles"></style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      -webkit-text-size-adjust: 100%;
    }

    /* ══════════════════════════════
       アップロード画面
    ══════════════════════════════ */
    #upload-screen {
      position: fixed; inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d1117;
      z-index: 90;
    }
    .upload-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 36px 32px;
      border: 2px dashed #30363d;
      border-radius: 16px;
      max-width: 320px;
      width: 90%;
    }
    .upload-icon  { font-size: 44px; }
    .upload-title { font-size: 18px; font-weight: 700; color: #c9d1d9; }
    .upload-hint  { font-size: 12px; color: #8b949e; text-align: center; line-height: 1.5; }
    label.btn-primary {
      display: inline-block;
      background: #238636; color: #fff;
      padding: 12px 28px; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; user-select: none;
    }
    label.btn-primary:active { background: #2ea043; }
    input[type="file"] { display: none; }

    /* ══════════════════════════════
       ローディング
    ══════════════════════════════ */
    #loading {
      display: none;
      position: fixed; inset: 0;
      background: rgba(13,17,23,0.88);
      justify-content: center; align-items: center;
      flex-direction: column; gap: 12px;
      z-index: 200;
      font-size: 14px; color: #58a6ff;
    }

    /* ══════════════════════════════
       メインアプリ
    ══════════════════════════════ */
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    /* ── ツールバー ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      height: 38px;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
    }
    label.btn-sm {
      display: inline-block;
      background: #21262d; color: #58a6ff;
      border: 1px solid #30363d; border-radius: 6px;
      padding: 4px 9px; font-size: 11px; font-weight: 600;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    label.btn-sm:active { background: #30363d; }
    #filename {
      font-size: 11px; color: #c9d1d9;
      max-width: 90px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0;
    }
    #info {
      font-size: 11px; color: #8b949e;
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #filter-badge {
      font-size: 11px; color: #388bfd; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
    }
    button.btn-sm {
      background: #21262d; color: #c9d1d9;
      border: 1px solid #30363d; border-radius: 6px;
      padding: 4px 9px; font-size: 11px;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    button.btn-sm:active { background: #30363d; }
    #btn-settings { color: #58a6ff; }

    /* ── テーブルラッパー ── */
    #tbl-wrap {
      flex: 1;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* ── テーブル ── */
    table {
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      font-size: 11px;
    }

    /* ── ヘッダー行 ── */
    thead th {
      position: sticky; top: 0;
      background: #161b22;
      border-bottom: 2px solid #388bfd;
      border-right: 1px solid #21262d;
      z-index: 3; padding: 0;
      overflow: hidden;
    }
    .th-inner {
      display: flex; align-items: center;
      height: 36px; padding: 0 2px 0 6px; gap: 2px;
    }
    .th-name {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: #58a6ff; font-size: 10px; font-weight: 600; line-height: 1.2;
    }
    .th-filter-btn {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: none; border: 1px solid transparent; border-radius: 4px;
      color: #484f58; cursor: pointer; font-size: 9px; padding: 0; line-height: 1;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .th-filter-btn:active { background: #21262d; }
    .th-filter-btn.is-active { color: #388bfd; border-color: #388bfd; background: rgba(56,139,253,0.12); }

    /* ── 固定列 ── */
    .pin-1 { position: sticky !important; left: 0;    z-index: 2; }
    .pin-2 { position: sticky !important; z-index: 2; }
    .pin-3 { position: sticky !important; z-index: 2; }
    thead th.pin-1, thead th.pin-2, thead th.pin-3 { z-index: 6; }
    .pin-3, thead th.pin-3 { border-right: 2px solid #388bfd !important; }

    /* ── データ行 ── */
    tbody tr.data-row td {
      height: 34px; padding: 0 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      border-bottom: 1px solid #21262d; border-right: 1px solid #21262d;
      color: #c9d1d9; font-size: 11px; background: #0d1117;
      vertical-align: middle; cursor: default; -webkit-user-modify: read-only;
    }
    tbody tr.row-even td { background: #111820; }
    tbody tr.row-odd  td.pin-1, tbody tr.row-odd  td.pin-2, tbody tr.row-odd  td.pin-3 { background: #131920; }
    tbody tr.row-even td.pin-1, tbody tr.row-even td.pin-2, tbody tr.row-even td.pin-3 { background: #171e28; }

    /* ── スペーサー行 ── */
    tbody tr.vspacer td { padding: 0; border: none; background: transparent !important; }

    /* ── 選択行 ── */
    tbody tr.selected-row td { background: #1c2d4a !important; }
    tbody tr.selected-row td.pin-1,
    tbody tr.selected-row td.pin-2,
    tbody tr.selected-row td.pin-3 { background: #223356 !important; }
    td.pin-1 { cursor: pointer; }

    /* ══════════════════════════════
       フィルタードロップダウン (ボトムシート)
    ══════════════════════════════ */
    .bottom-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
    }
    .bottom-sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      max-height: 78vh;
      background: #161b22;
      border-top: 1px solid #30363d;
      border-radius: 18px 18px 0 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sheet-handle {
      flex-shrink: 0; height: 20px;
      display: flex; justify-content: center; align-items: center;
    }
    .sheet-handle::after {
      content: ''; width: 36px; height: 4px;
      background: #30363d; border-radius: 2px;
    }
    .sheet-close-btn {
      background: #21262d; border: none; color: #8b949e;
      font-size: 16px; width: 28px; height: 28px;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* フィルター固有 */
    #fd-header {
      flex-shrink: 0; display: flex; align-items: center;
      padding: 0 16px 10px; gap: 10px;
    }
    #fd-col-name {
      flex: 1; font-size: 15px; font-weight: 700; color: #c9d1d9;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #fd-search-wrap { flex-shrink: 0; padding: 0 12px 8px; }
    #fd-search {
      width: 100%; height: 36px;
      background: #0d1117; color: #c9d1d9;
      border: 1px solid #30363d; border-radius: 8px;
      padding: 0 12px; font-size: 14px; outline: none; -webkit-appearance: none;
    }
    #fd-search:focus { border-color: #388bfd; }
    #fd-search::placeholder { color: #484f58; }
    #fd-select-all {
      flex-shrink: 0; padding: 6px 16px 8px;
      border-bottom: 1px solid #21262d;
    }
    #fd-select-all label {
      display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 2px 0;
    }
    #fd-select-all label span { font-size: 13px; color: #c9d1d9; }
    #fd-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .fd-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 16px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .fd-item:active { background: #21262d; }
    .fd-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: #388bfd; flex-shrink: 0; }
    .fd-val { flex: 1; font-size: 13px; color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; user-select: none; }
    .fd-val.is-empty { color: #484f58; font-style: italic; }
    #fd-more { padding: 8px 16px; font-size: 11px; color: #8b949e; text-align: center; display: none; }
    #fd-footer {
      flex-shrink: 0; display: flex; gap: 10px; padding: 10px 16px 16px;
      border-top: 1px solid #21262d;
    }
    #fd-footer button {
      flex: 1; height: 46px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    #fd-cancel-btn { background: #21262d; color: #c9d1d9; }
    #fd-ok-btn     { background: #238636; color: #fff; }
    #fd-cancel-btn:active { background: #30363d; }
    #fd-ok-btn:active     { background: #2ea043; }

    /* ══════════════════════════════
       設定パネル (列幅)
    ══════════════════════════════ */
    #settings-header {
      flex-shrink: 0; display: flex; align-items: center;
      padding: 0 16px 12px; gap: 10px;
    }
    #settings-title { flex: 1; font-size: 15px; font-weight: 700; color: #c9d1d9; }

    #settings-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    #settings-footer {
      flex-shrink: 0; padding: 12px 16px 16px;
      border-top: 1px solid #21262d;
    }
    #settings-reset-all {
      width: 100%; height: 46px;
      background: none; color: #f78166;
      border: 1px solid #f78166; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #settings-reset-all:active { background: rgba(247,129,102,0.1); }

    .settings-item {
      display: flex; align-items: center;
      padding: 9px 16px; gap: 10px;
      border-bottom: 1px solid #21262d;
    }
    .settings-col-name {
      width: 100px; flex-shrink: 0;
      font-size: 11px; color: #8b949e;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .settings-col-name.has-name { color: #c9d1d9; }
    .settings-slider {
      flex: 1; height: 4px; accent-color: #388bfd;
      cursor: pointer; min-width: 0;
    }
    .settings-val {
      width: 42px; flex-shrink: 0;
      font-size: 11px; color: #58a6ff;
      text-align: right; white-space: nowrap;
    }
    .settings-reset-btn {
      flex-shrink: 0; width: 24px; height: 24px;
      background: none; border: none;
      color: #484f58; font-size: 13px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .settings-reset-btn:active { color: #388bfd; }

    /* ── 必須バッジ ── */
    .settings-required-badge {
      font-size: 9px; color: #f78166;
      border: 1px solid #f78166; border-radius: 3px;
      padding: 1px 4px; flex-shrink: 0; white-space: nowrap;
    }

    /* ── コピートースト ── */
    #copy-toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%);
      background: #238636; color: #fff;
      padding: 10px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      pointer-events: none; opacity: 0; transition: opacity 0.2s;
      z-index: 300; white-space: nowrap;
    }
    #copy-toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- アップロード画面 -->
  <div id="upload-screen">
    <div class="upload-box">
      <div class="upload-icon">📊</div>
      <div class="upload-title">LISTeditor</div>
      <label class="btn-primary" for="file-input-init">CSVファイルを選択</label>
      <div class="upload-hint">ExcelでCSVとして書き出したファイルを選択<br>Shift-JIS / UTF-8 に対応</div>
      <input type="file" id="file-input-init" accept=".csv,text/csv">
    </div>
  </div>

  <!-- ローディング -->
  <div id="loading"><span id="loading-msg">読み込み中…</span></div>

  <!-- メインアプリ -->
  <div id="app">
    <div id="toolbar">
      <label class="btn-sm" for="file-input-reload">CSV更新</label>
      <input type="file" id="file-input-reload" accept=".csv,text/csv">
      <span id="filename"></span>
      <span id="info"></span>
      <span id="filter-badge"></span>
      <button class="btn-sm" id="btn-settings">⚙ 列幅</button>
      <button class="btn-sm" id="btn-clear">クリア</button>
    </div>
    <div id="tbl-wrap">
      <table id="tbl" contenteditable="false">
        <colgroup id="tbl-cg"></colgroup>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- コピートースト -->
  <div id="copy-toast">コピーしました</div>

  <!-- フィルタードロップダウン -->
  <div id="fd-overlay" class="bottom-overlay">
    <div class="bottom-sheet">
      <div class="sheet-handle"></div>
      <div id="fd-header">
        <span id="fd-col-name"></span>
        <button class="sheet-close-btn" id="fd-close-btn">✕</button>
      </div>
      <div id="fd-search-wrap">
        <input type="text" id="fd-search" placeholder="値を検索…"
               autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      </div>
      <div id="fd-select-all">
        <label><input type="checkbox" id="fd-all-cb"><span>すべて選択</span></label>
      </div>
      <div id="fd-list"></div>
      <div id="fd-more"></div>
      <div id="fd-footer">
        <button id="fd-cancel-btn">キャンセル</button>
        <button id="fd-ok-btn">OK</button>
      </div>
    </div>
  </div>

  <!-- 設定パネル (列幅) -->
  <div id="settings-overlay" class="bottom-overlay">
    <div class="bottom-sheet">
      <div class="sheet-handle"></div>
      <div id="settings-header">
        <span id="settings-title">列幅設定</span>
        <button class="sheet-close-btn" id="settings-close-btn">✕</button>
      </div>
      <div id="settings-list"></div>
      <div id="settings-footer">
        <button id="settings-reset-all">全列リセット</button>
      </div>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    /* ═══════════════════════════════════
       定数・設定
    ═══════════════════════════════════ */
    const ROW_H         = 34;
    const BUFFER        = 20;
    const MAX_LIST_SHOW = 500;
    const LS_KEY        = 'listeditor_colwidths_v1';

    const DEFAULT_W = 82;
    const COL_W_PRESET = {
       0:100,  1:130,  2:80,   3:80,   4:80,
       5:70,   6:110,  7:145,  8:70,   9:135,
      10:48,  11:56,  12:48,  13:56,  14:48,
      15:56,  16:48,  17:56,  18:48,
      19:58,  20:48,
      21:82,  22:82,
      23:135, 24:65,  25:82,  26:82,
      27:80,  28:80,
      29:82,  30:78,  31:52,  32:50,
      33:160, 34:160,
      35:60,  36:88,  37:135, 38:112, 39:135,
      40:92,  41:90,  42:135, 43:90,  44:90,
      45:155, 46:60,  47:82,  48:82,  49:60,
      50:72,
    };

    /* ═══════════════════════════════════
       状態
    ═══════════════════════════════════ */
    let headers      = [];
    let colWidths    = [];   // 現在の列幅 (px)
    let allData      = [];
    let filteredData = [];
    let filterState  = new Map();
    let vStart = -1, vEnd = -1;

    /* フィルタードロップダウン作業用 */
    let fd = { colIndex: -1, allValues: [], pending: new Set(), searchQ: '' };

    let selectedRowIndex = -1;

    /* ═══════════════════════════════════
       LocalStorage (列幅)
    ═══════════════════════════════════ */
    function loadWidthPrefs() {
      try { const s = localStorage.getItem(LS_KEY); return s ? JSON.parse(s) : {}; }
      catch { return {}; }
    }

    let saveWidthTimer = null;
    function schedSaveWidths() {
      clearTimeout(saveWidthTimer);
      saveWidthTimer = setTimeout(() => {
        const map = {};
        headers.forEach((h, i) => { map[h || `__col${i}`] = colWidths[i]; });
        try { localStorage.setItem(LS_KEY, JSON.stringify(map)); } catch {}
      }, 300);
    }

    function resolveColWidths() {
      const prefs = loadWidthPrefs();
      colWidths = headers.map((h, i) => {
        const key  = h || `__col${i}`;
        const pref = prefs[key];
        let w = (typeof pref === 'number' && pref >= 0 && pref <= 400) ? pref : (COL_W_PRESET[i] ?? DEFAULT_W);
        if (i === 0 && w < 40) w = 40;
        return w;
      });
    }

    /* ═══════════════════════════════════
       固定列の left 計算
    ═══════════════════════════════════ */
    function pinLeftValues() {
      return [0, colWidths[0], colWidths[0] + colWidths[1]];
    }

    /* ═══════════════════════════════════
       CSV 読み込み
    ═══════════════════════════════════ */
    async function readFile(file) {
      const buf = await file.arrayBuffer();
      const u8  = new Uint8Array(buf);
      if (u8[0] === 0xEF && u8[1] === 0xBB && u8[2] === 0xBF)
        return new TextDecoder('utf-8').decode(buf);
      const utf8 = new TextDecoder('utf-8', { fatal: false }).decode(buf);
      if ((utf8.match(/�/g) || []).length < 3) return utf8;
      return new TextDecoder('shift-jis', { fatal: false }).decode(buf);
    }

    function parseCSV(text) {
      const rows = [];
      let i = 0, n = text.length;
      while (i < n) {
        const fields = []; let cur = '', inQ = false;
        while (i < n) {
          const c = text[i];
          if (c === '"') {
            if (inQ && text[i+1] === '"') { cur += '"'; i += 2; }
            else { inQ = !inQ; i++; }
          } else if (c === ',' && !inQ) { fields.push(cur.trim()); cur = ''; i++; }
          else if ((c === '\r' || c === '\n') && !inQ) {
            if (c === '\r' && text[i+1] === '\n') i++;
            i++; break;
          } else { cur += c; i++; }
        }
        fields.push(cur.trim());
        if (fields.length > 1 || fields[0] !== '') rows.push(fields);
      }
      return rows;
    }

    async function loadCSV(file) {
      showLoading('読み込み中…');
      try {
        const text = await readFile(file);
        const rows = parseCSV(text);
        if (rows.length < 2) throw new Error('データが1行以上必要です');

        headers = rows[0];
        allData = rows.slice(1);
        const nCols = headers.length;
        for (const r of allData) { while (r.length < nCols) r.push(''); }

        resolveColWidths();
        filterState  = new Map();
        filteredData = allData;
        vStart = -1; vEnd = -1;

        buildColGroup();
        buildHeader();
        updateInfo();

        document.getElementById('filename').textContent = file.name;
        document.getElementById('upload-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        hideLoading();
        renderVisible();
      } catch (err) {
        hideLoading();
        alert('CSVの読み込みに失敗しました:\n' + err.message);
      }
    }

    /* ═══════════════════════════════════
       テーブル構築
    ═══════════════════════════════════ */
    function buildColGroup() {
      const cg = document.getElementById('tbl-cg');
      cg.innerHTML = '';
      colWidths.forEach(w => {
        const col = document.createElement('col');
        col.style.width = w + 'px';
        cg.appendChild(col);
      });
      updateHideStyles();
    }

    /* 幅 0 の列を CSS で完全非表示 */
    function updateHideStyles() {
      const css = colWidths
        .map((w, i) => w === 0 ? i : -1).filter(i => i >= 0)
        .map(i => `#tbl th:nth-child(${i+1}),#tbl td:nth-child(${i+1}){width:0!important;min-width:0!important;max-width:0!important;padding:0!important;border:none!important;overflow:hidden}`)
        .join('');
      document.getElementById('col-hide-styles').textContent = css;
    }

    function buildHeader() {
      const thead  = document.getElementById('thead');
      thead.innerHTML = '';
      const pl = pinLeftValues();
      const tr = document.createElement('tr');

      headers.forEach((h, i) => {
        const label = h || `(${i + 1})`;
        const th = document.createElement('th');
        if (i < 3) { th.classList.add('pin-' + (i + 1)); th.style.left = pl[i] + 'px'; }

        const inner = document.createElement('div');
        inner.className = 'th-inner';

        const name = document.createElement('span');
        name.className = 'th-name'; name.textContent = label; name.title = label;

        const btn = document.createElement('button');
        btn.className   = 'th-filter-btn';
        btn.textContent = '▼';
        btn.title       = label + ' のフィルター';
        btn.dataset.col = i;
        btn.addEventListener('click', e => { e.stopPropagation(); openFD(+btn.dataset.col); });

        inner.appendChild(name); inner.appendChild(btn);
        th.appendChild(inner); tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    /* ═══════════════════════════════════
       列幅更新 (リアルタイム)
    ═══════════════════════════════════ */
    function setColWidth(colIndex, width) {
      const wasZero = colWidths[colIndex] === 0;
      colWidths[colIndex] = width;

      /* colgroup の該当列を更新 */
      const cols = document.querySelectorAll('#tbl-cg col');
      if (cols[colIndex]) cols[colIndex].style.width = width + 'px';

      /* 固定列 (pin-1/2/3) の left を更新 */
      if (colIndex < 3) {
        const pl = pinLeftValues();
        for (let p = 0; p < 3; p++) {
          const left = pl[p] + 'px';
          document.querySelectorAll(`.pin-${p + 1}`).forEach(el => el.style.left = left);
        }
      }

      /* 非表示状態が変わったときだけ CSS を更新 */
      if (wasZero !== (width === 0)) updateHideStyles();

      schedSaveWidths();
    }

    /* ═══════════════════════════════════
       フィルター適用
    ═══════════════════════════════════ */
    function applyFilters() {
      filteredData = filterState.size === 0 ? allData
        : allData.filter(row => {
          for (const [col, allowed] of filterState) {
            if (!allowed.has(row[col] ?? '')) return false;
          }
          return true;
        });
      updateInfo();
      refreshFilterButtons();
      selectedRowIndex = -1;
      vStart = -1; vEnd = -1;
      renderVisible();
    }

    function updateInfo() {
      document.getElementById('info').textContent =
        `${filteredData.length.toLocaleString()} / ${allData.length.toLocaleString()} 件`;
      const n = filterState.size;
      document.getElementById('filter-badge').textContent = n > 0 ? `▼ ${n}列` : '';
    }

    function refreshFilterButtons() {
      document.querySelectorAll('.th-filter-btn').forEach(btn => {
        btn.classList.toggle('is-active', filterState.has(+btn.dataset.col));
      });
    }

    /* ═══════════════════════════════════
       バーチャルスクロール
    ═══════════════════════════════════ */
    function renderVisible() {
      const wrap  = document.getElementById('tbl-wrap');
      const tbody = document.getElementById('tbody');
      const total = filteredData.length;
      const nCols = headers.length;
      const pl    = pinLeftValues();

      const st = wrap.scrollTop, ch = wrap.clientHeight;
      const ns = Math.max(0,     Math.floor(st / ROW_H) - BUFFER);
      const ne = Math.min(total, Math.ceil((st + ch) / ROW_H) + BUFFER);

      if (ns === vStart && ne === vEnd) return;
      vStart = ns; vEnd = ne;

      const frag = document.createDocumentFragment();

      const topH = ns * ROW_H;
      if (topH > 0) frag.appendChild(mkSpacer(nCols, topH));

      for (let r = ns; r < ne; r++) {
        const rowData = filteredData[r];
        const tr = document.createElement('tr');
        tr.className = 'data-row ' + (r % 2 === 0 ? 'row-even' : 'row-odd');
        tr.dataset.rowIndex = r;
        if (r === selectedRowIndex) tr.classList.add('selected-row');

        for (let c = 0; c < nCols; c++) {
          const td  = document.createElement('td');
          if (c < 3) { td.classList.add('pin-' + (c + 1)); td.style.left = pl[c] + 'px'; }
          const val = rowData[c] ?? '';
          td.textContent = val;
          if (val.length > 10) td.title = val;
          tr.appendChild(td);
        }
        frag.appendChild(tr);
      }

      const botH = Math.max(0, total - ne) * ROW_H;
      if (botH > 0) frag.appendChild(mkSpacer(nCols, botH));

      tbody.innerHTML = '';
      tbody.appendChild(frag);
    }

    function mkSpacer(cols, h) {
      const tr = document.createElement('tr'); tr.className = 'vspacer';
      const td = document.createElement('td'); td.colSpan = cols; td.style.height = h + 'px';
      tr.appendChild(td); return tr;
    }

    /* ═══════════════════════════════════
       フィルタードロップダウン
    ═══════════════════════════════════ */
    function getUniqueValues(col) {
      const set = new Set();
      for (const row of allData) set.add(row[col] ?? '');
      return [...set].sort((a, b) => {
        if (a === '' && b !== '') return 1;
        if (a !== '' && b === '') return -1;
        const na = parseFloat(a.replace(/,/g, '')), nb = parseFloat(b.replace(/,/g, ''));
        if (!isNaN(na) && !isNaN(nb)) return na - nb;
        return a.localeCompare(b, 'ja');
      });
    }

    function openFD(col) {
      fd.colIndex  = col;
      fd.allValues = getUniqueValues(col);
      fd.searchQ   = '';
      fd.pending   = filterState.has(col)
        ? new Set(filterState.get(col))
        : new Set(fd.allValues);
      document.getElementById('fd-col-name').textContent = headers[col] || `列${col + 1}`;
      document.getElementById('fd-search').value = '';
      renderFDList();
      document.getElementById('fd-overlay').style.display = 'block';
      setTimeout(() => document.getElementById('fd-search').focus(), 100);
    }

    function renderFDList() {
      const q        = fd.searchQ.toLowerCase();
      const filtered = q ? fd.allValues.filter(v => v.toLowerCase().includes(q)) : fd.allValues;
      const items    = filtered.slice(0, MAX_LIST_SHOW);
      const hasMore  = filtered.length > MAX_LIST_SHOW;

      const allCb       = document.getElementById('fd-all-cb');
      const allChecked  = filtered.length > 0 && filtered.every(v => fd.pending.has(v));
      const someChecked = filtered.some(v => fd.pending.has(v));
      allCb.checked       = allChecked;
      allCb.indeterminate = !allChecked && someChecked;

      const list = document.getElementById('fd-list');
      const frag = document.createDocumentFragment();
      for (const val of items) {
        const div = document.createElement('div'); div.className = 'fd-item';
        const cb  = document.createElement('input');
        cb.type = 'checkbox'; cb.checked = fd.pending.has(val);
        const uid = 'fdc' + Math.random().toString(36).slice(2); cb.id = uid;
        cb.addEventListener('change', () => {
          if (cb.checked) fd.pending.add(val); else fd.pending.delete(val);
          syncAllCb();
        });
        const lbl = document.createElement('span');
        lbl.className = 'fd-val' + (val === '' ? ' is-empty' : '');
        lbl.textContent = val === '' ? '(空白)' : val;
        lbl.addEventListener('click', () => { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); });
        div.appendChild(cb); div.appendChild(lbl); frag.appendChild(div);
      }
      list.innerHTML = ''; list.appendChild(frag);

      const moreEl = document.getElementById('fd-more');
      if (hasMore) {
        moreEl.style.display = 'block';
        moreEl.textContent = `他 ${(filtered.length - MAX_LIST_SHOW).toLocaleString()} 件 — 検索で絞り込んでください`;
      } else { moreEl.style.display = 'none'; }
    }

    function syncAllCb() {
      const q        = fd.searchQ.toLowerCase();
      const filtered = q ? fd.allValues.filter(v => v.toLowerCase().includes(q)) : fd.allValues;
      const allCb       = document.getElementById('fd-all-cb');
      const allChecked  = filtered.length > 0 && filtered.every(v => fd.pending.has(v));
      const someChecked = filtered.some(v => fd.pending.has(v));
      allCb.checked       = allChecked;
      allCb.indeterminate = !allChecked && someChecked;
    }

    function closeFD() { document.getElementById('fd-overlay').style.display = 'none'; }

    function applyFD() {
      const allSelected = fd.allValues.every(v => fd.pending.has(v));
      if (allSelected) filterState.delete(fd.colIndex);
      else filterState.set(fd.colIndex, new Set(fd.pending));
      applyFilters(); closeFD();
    }

    /* ═══════════════════════════════════
       設定パネル (列幅)
    ═══════════════════════════════════ */
    function openSettings() {
      const list = document.getElementById('settings-list');
      list.innerHTML = '';
      const frag = document.createDocumentFragment();

      headers.forEach((h, i) => {
        const label    = h || `(${i + 1})`;
        const defaultW = COL_W_PRESET[i] ?? DEFAULT_W;
        const curW     = colWidths[i];

        const item = document.createElement('div');
        item.className = 'settings-item';

        const nameEl = document.createElement('span');
        nameEl.className = 'settings-col-name' + (h ? ' has-name' : '');
        nameEl.textContent = label; nameEl.title = label;

        const slider = document.createElement('input');
        slider.type = 'range'; slider.className = 'settings-slider';
        slider.min = i === 0 ? 40 : 0; slider.max = 400; slider.step = 5;
        slider.value = curW;

        const valEl = document.createElement('span');
        valEl.className = 'settings-val';
        valEl.textContent = curW === 0 ? '非表示' : curW + 'px';
        if (curW === 0) valEl.style.color = '#f78166';

        const resetBtn = document.createElement('button');
        resetBtn.className = 'settings-reset-btn';
        resetBtn.textContent = '↩'; resetBtn.title = 'デフォルトに戻す';

        slider.addEventListener('input', () => {
          const w = +slider.value;
          valEl.textContent = w === 0 ? '非表示' : w + 'px';
          valEl.style.color = w === 0 ? '#f78166' : '#58a6ff';
          setColWidth(i, w);
        });

        resetBtn.addEventListener('click', () => {
          slider.value = defaultW;
          valEl.textContent = defaultW === 0 ? '非表示' : defaultW + 'px';
          valEl.style.color = defaultW === 0 ? '#f78166' : '#58a6ff';
          setColWidth(i, defaultW);
        });

        item.appendChild(nameEl);
        if (i === 0) {
          const badge = document.createElement('span');
          badge.className = 'settings-required-badge';
          badge.textContent = '必須';
          item.appendChild(badge);
        }
        item.appendChild(slider);
        item.appendChild(valEl);  item.appendChild(resetBtn);
        frag.appendChild(item);
      });

      list.appendChild(frag);
      document.getElementById('settings-overlay').style.display = 'block';
    }

    function closeSettings() { document.getElementById('settings-overlay').style.display = 'none'; }

    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('copy-toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
    }

    function selectRow(r) {
      selectedRowIndex = r;
      vStart = -1; vEnd = -1;
      renderVisible();
      const rowData = filteredData[r];
      if (!rowData) return;
      navigator.clipboard.writeText(rowData.join('\t'))
        .then(() => showToast('コピーしました'))
        .catch(() => showToast('コピー失敗'));
    }

    function resetAllWidths() {
      headers.forEach((_, i) => { colWidths[i] = COL_W_PRESET[i] ?? DEFAULT_W; });
      const cols = document.querySelectorAll('#tbl-cg col');
      colWidths.forEach((w, i) => { if (cols[i]) cols[i].style.width = w + 'px'; });
      const pl = pinLeftValues();
      for (let p = 0; p < 3; p++) {
        document.querySelectorAll(`.pin-${p + 1}`).forEach(el => el.style.left = pl[p] + 'px');
      }
      updateHideStyles();
      schedSaveWidths();
      openSettings(); // リストを更新
    }

    /* ═══════════════════════════════════
       イベントリスナー
    ═══════════════════════════════════ */
    function onFileChange(e) {
      const f = e.target.files[0]; if (f) loadCSV(f); e.target.value = '';
    }
    document.getElementById('file-input-init').addEventListener('change', onFileChange);
    document.getElementById('file-input-reload').addEventListener('change', onFileChange);

    /* スクロール */
    let rafId = null;
    document.getElementById('tbl-wrap').addEventListener('scroll', () => {
      if (rafId) return;
      rafId = requestAnimationFrame(() => { rafId = null; renderVisible(); });
    }, { passive: true });

    /* 行選択 (レコード番号タップ) */
    document.getElementById('tbody').addEventListener('click', e => {
      const td = e.target.closest('td.pin-1');
      if (!td) return;
      const tr = td.closest('tr[data-row-index]');
      if (!tr) return;
      selectRow(+tr.dataset.rowIndex);
    });

    /* フィルタークリア */
    document.getElementById('btn-clear').addEventListener('click', () => {
      filterState.clear(); applyFilters();
    });

    /* 設定パネル */
    document.getElementById('btn-settings').addEventListener('click', openSettings);
    document.getElementById('settings-close-btn').addEventListener('click', closeSettings);
    document.getElementById('settings-reset-all').addEventListener('click', resetAllWidths);
    document.getElementById('settings-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('settings-overlay')) closeSettings();
    });

    /* フィルター */
    document.getElementById('fd-search').addEventListener('input', e => { fd.searchQ = e.target.value; renderFDList(); });
    document.getElementById('fd-all-cb').addEventListener('change', e => {
      const q        = fd.searchQ.toLowerCase();
      const filtered = q ? fd.allValues.filter(v => v.toLowerCase().includes(q)) : fd.allValues;
      if (e.target.checked) { for (const v of filtered) fd.pending.add(v); }
      else                  { for (const v of filtered) fd.pending.delete(v); }
      renderFDList();
    });
    document.getElementById('fd-close-btn').addEventListener('click',  closeFD);
    document.getElementById('fd-cancel-btn').addEventListener('click', closeFD);
    document.getElementById('fd-ok-btn').addEventListener('click', applyFD);
    document.getElementById('fd-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('fd-overlay')) closeFD();
    });

    /* ═══════════════════════════════════
       ユーティリティ
    ═══════════════════════════════════ */
    function showLoading(msg) {
      document.getElementById('loading-msg').textContent = msg;
      document.getElementById('loading').style.display = 'flex';
    }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

  })();
  </script>
</body>
</html>
